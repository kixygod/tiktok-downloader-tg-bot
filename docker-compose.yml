services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tiktok_bot
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-botpass}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks: [app]
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d tiktok_bot"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "''", "--appendonly", "no"]
    networks: [app]
    restart: unless-stopped

  xray:
    profiles: [xray]
    image: superng6/singbox:latest
    container_name: xray-hysteria2
    volumes:
      - ./xray/config.json:/etc/sing-box/config.json:ro
    ports:
      - "127.0.0.1:1080:1080" # SOCKS5 (локально)
      - "127.0.0.1:1087:1087" # HTTP proxy (локально)
    networks: [app]
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    command: ["run", "-c", "/etc/sing-box/config.json"]

  xray-vless:
    profiles: [xray]
    image: superng6/singbox:latest
    container_name: xray-vless
    volumes:
      - ./xray/config-vless.json:/etc/sing-box/config.json:ro
    ports:
      - "127.0.0.1:1081:1080" # SOCKS5 (локально)
      - "127.0.0.1:1088:1087" # HTTP proxy (локально)
    networks: [app]
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    command: ["run", "-c", "/etc/sing-box/config.json"]

  xray-shadowsocks:
    profiles: [xray]
    image: superng6/singbox:latest
    container_name: xray-shadowsocks
    volumes:
      - ./xray/config-shadowsocks.json:/etc/sing-box/config.json:ro
    ports:
      - "127.0.0.1:1082:1080" # SOCKS5 (локально)
      - "127.0.0.1:1089:1087" # HTTP proxy (локально)
    networks: [app]
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    command: ["run", "-c", "/etc/sing-box/config.json"]

  bot:
    build: ./bot
    environment:
      USE_XRAY: ${USE_XRAY:-true}
      BOT_TOKEN: ${BOT_TOKEN}
      REDIS_URL: redis://redis:6379
      QUEUE_NAME: tiktok
      DATABASE_URL: postgresql://bot:${POSTGRES_PASSWORD:-botpass}@postgres:5432/tiktok_bot
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID:-}
      HTTP_PROXY: ${XRAY_HTTP_PROXY}
      HTTPS_PROXY: ${XRAY_HTTPS_PROXY}
      ALL_PROXY: ${XRAY_ALL_PROXY}
      NO_PROXY: "127.0.0.1,localhost,redis,postgres"
      DASHBOARD_BASIC_AUTH: ${DASHBOARD_BASIC_AUTH:-admin:admin}
      SIZE_LIMIT_MB: "50"
    depends_on: [redis, postgres]
    networks: [app]
    restart: unless-stopped
    ports:
      - "53500:3000"
    dns:
      - 8.8.8.8
      - 1.1.1.1

  worker:
    build: ./worker
    environment:
      USE_XRAY: ${USE_XRAY:-true}
      REDIS_URL: redis://redis:6379
      QUEUE_NAME: tiktok
      TELEGRAM_BOT_TOKEN: ${BOT_TOKEN}
      SIZE_LIMIT_MB: "50"
      MAX_CONCURRENCY: "2"
      # Прокси для ytdlp/ffmpeg/любых http-клиентов (fallback на VLESS)
      HTTP_PROXY: ${XRAY_HTTP_PROXY}
      HTTPS_PROXY: ${XRAY_HTTPS_PROXY}
      ALL_PROXY: ${XRAY_ALL_PROXY}
      NO_PROXY: "127.0.0.1,localhost,redis"
      # Прокси для fallback (Hysteria2, VLESS, Shadowsocks)
      YTDLP_PROXY_HYSTERIA2: ${YTDLP_PROXY_HYSTERIA2}
      YTDLP_PROXY_VLESS: ${YTDLP_PROXY_VLESS}
      YTDLP_PROXY_SHADOWSOCKS: ${YTDLP_PROXY_SHADOWSOCKS}
    volumes:
      - tmp_data:/tmp/downloads
    depends_on: [redis]
    networks: [app]
    restart: unless-stopped

networks:
  app:

volumes:
  tmp_data:
  pg_data:
