services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "''", "--appendonly", "no"]
    networks: [app]
    restart: unless-stopped

  xray:
    image: superng6/singbox:latest
    container_name: xray-hysteria2
    volumes:
      - ./xray/config.json:/etc/sing-box/config.json:ro
    ports:
      - "127.0.0.1:1080:1080" # SOCKS5 (локально)
      - "127.0.0.1:1087:1087" # HTTP proxy (локально)
    networks: [app]
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    command: ["run", "-c", "/etc/sing-box/config.json"]

  xray-vless:
    image: superng6/singbox:latest
    container_name: xray-vless
    volumes:
      - ./xray/config-vless.json:/etc/sing-box/config.json:ro
    ports:
      - "127.0.0.1:1081:1080" # SOCKS5 (локально)
      - "127.0.0.1:1088:1087" # HTTP proxy (локально)
    networks: [app]
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    command: ["run", "-c", "/etc/sing-box/config.json"]

  xray-shadowsocks:
    image: superng6/singbox:latest
    container_name: xray-shadowsocks
    volumes:
      - ./xray/config-shadowsocks.json:/etc/sing-box/config.json:ro
    ports:
      - "127.0.0.1:1082:1080" # SOCKS5 (локально)
      - "127.0.0.1:1089:1087" # HTTP proxy (локально)
    networks: [app]
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    command: ["run", "-c", "/etc/sing-box/config.json"]

  bot:
    build: ./bot
    environment:
      USE_XRAY: ${USE_XRAY:-true}
      BOT_TOKEN: ${BOT_TOKEN}
      REDIS_URL: redis://redis:6379
      QUEUE_NAME: tiktok
      # Проксируем ВСЁ через Xray (значения берутся из .env и могут быть выключены)
      HTTP_PROXY: ${XRAY_HTTP_PROXY}
      HTTPS_PROXY: ${XRAY_HTTPS_PROXY}
      ALL_PROXY: ${XRAY_ALL_PROXY}
      NO_PROXY: "127.0.0.1,localhost,redis"
      DASHBOARD_BASIC_AUTH: ${DASHBOARD_BASIC_AUTH:-admin:admin}
      SIZE_LIMIT_MB: "50"
    depends_on: [redis]
    networks: [app]
    restart: unless-stopped
    ports:
      - "53500:3000"
    volumes:
      - bot_data:/app/data
    dns:
      - 8.8.8.8
      - 1.1.1.1

  worker:
    build: ./worker
    environment:
      USE_XRAY: ${USE_XRAY:-true}
      REDIS_URL: redis://redis:6379
      QUEUE_NAME: tiktok
      TELEGRAM_BOT_TOKEN: ${BOT_TOKEN}
      SIZE_LIMIT_MB: "50"
      MAX_CONCURRENCY: "2"
      # Прокси для ytdlp/ffmpeg/любых http-клиентов (fallback на VLESS)
      HTTP_PROXY: ${XRAY_HTTP_PROXY}
      HTTPS_PROXY: ${XRAY_HTTPS_PROXY}
      ALL_PROXY: ${XRAY_ALL_PROXY}
      NO_PROXY: "127.0.0.1,localhost,redis"
      # Прокси для fallback (Hysteria2, VLESS, Shadowsocks)
      YTDLP_PROXY_HYSTERIA2: ${YTDLP_PROXY_HYSTERIA2}
      YTDLP_PROXY_VLESS: ${YTDLP_PROXY_VLESS}
      YTDLP_PROXY_SHADOWSOCKS: ${YTDLP_PROXY_SHADOWSOCKS}
    volumes:
      - tmp_data:/tmp/downloads
    depends_on: [redis]
    networks: [app]
    restart: unless-stopped

networks:
  app:

volumes:
  tmp_data:
  bot_data:

